services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb:inception
    container_name: maria-container
    env_file: .env
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - inception-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "wpuser", "-pwppassword", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 5

  wordpress:
    build: ./requirements/wordpress
    image: wordpress:inception
    container_name: wordpress-container
    env_file: .env
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception-net
    depends_on:
      mariadb:
        condition: service_healthy

  nginx:
    build: ./requirements/nginx
    image: nginx:inception
    container_name: nginx-container
    env_file: .env
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception-net
    depends_on:
      - wordpress

volumes:
  mariadb-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/phhofman/data/db
  wordpress-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/phhofman/data/wordpress

networks:
  inception-net:
    driver: bridge
    name: inception-net