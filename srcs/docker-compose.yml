services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb:inception
    container_name: maria-container
    env_file: .env
    secrets:
      - mysql_root_pw
      - mysql_user_pw
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - inception-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u $MYSQL_USER -p$$(cat /run/secrets/mysql_user_pw) --silent"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    image: wordpress:inception
    container_name: wordpress-container
    env_file: .env
    secrets:
      - wp_admin_pw
      - wp_user_pw
      - mysql_user_pw
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception-net
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build: ./requirements/nginx
    image: nginx:inception
    container_name: nginx-container
    env_file: .env
    secrets:
    - inception_crt
    - inception_key
    ports:
      - "443:443"
    volumes:
      - wordpress-data:/var/www/html
    networks:
      - inception-net
    depends_on:
      - wordpress
    restart: unless-stopped

volumes:
  mariadb-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/phhofman/data/db
  wordpress-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/phhofman/data/wordpress

networks:
  inception-net:
    driver: bridge
    name: inception-net

secrets:
  mysql_root_pw:
    file: ../secrets/mysql_root_pw.txt
  mysql_user_pw:
    file: ../secrets/mysql_user_pw.txt
  wp_admin_pw:
    file: ../secrets/wp_admin_pw.txt
  wp_user_pw:
    file: ../secrets/wp_user_pw.txt
  inception_crt:
    file: ../secrets/inception.crt
  inception_key:
    file: ../secrets/inception.key
  